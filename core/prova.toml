# One manifest, two hats. In Prova a package is one prova.toml-rooted unit; this one both exports a
# namespace (a plugin — `[plugin]`) and runs its own proofs (a suite). Author the plugin in
# init.lua; prove it in proofs/; ship both together.
[plugin]
name        = "{{ name }}"
description = "{{ description }}"
license     = "MIT"

# The range of prova versions this plugin is built against; a consumer is checked against it.
[requires]
prova = ">=0.3"

# Resolve THIS plugin from its own directory, so the self-tests can `require("{{ name }}")` exactly as
{% if standalone %}
# a consumer would. A CONSUMER instead pins it by source — a released tag:
#   {{ name }} = { git = "https://github.com/{{ org }}/prova-{{ name }}", tag = "v1" }
{% else %}
# a consumer would. The owning project needs no declaration at all — this directory lives under its
# plugin_root, so `require("{{ name }}")` already resolves from any proof.
{% endif %}
[plugins]
{{ name }} = { path = "." }
